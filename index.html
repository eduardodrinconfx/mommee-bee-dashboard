<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mommee Bee — Business Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 16px; }
      body { font-family: 'DM Sans', sans-serif; background: #EDEFEA; color: #1a1a1a; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #EDEFEA; }
      ::-webkit-scrollbar-thumb { background: #D9CCBD; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #B36A23; }
      button { font-family: 'DM Sans', sans-serif; }
      input, select, textarea { font-family: 'DM Sans', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
